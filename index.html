<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pachin - Cyber Edition</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
</head>
<body>
    <div id="game-wrapper">
        <div id="ui-layer">
            <div id="ball-count-label">balls: <span id="ball-count">10</span></div>
            <div id="status-label">status: <span id="status-msg">STOP LIGHT</span></div>
        </div>
        
        <div id="canvas-container">
            <canvas id="pachinko-canvas"></canvas>
            <div id="charge-container">
                <div id="charge-bar"></div>
            </div>
            <div id="game-over-overlay">
                <h1>SYSTEM HALT</h1>
                <button onclick="location.reload()">REBOOT</button>
            </div>
        </div>

        <div id="button-layer">
            <button id="stop-light-btn">stop light</button>
            <button id="shoot-btn" disabled>shoot</button>
            <div id="version-tag">v1.1.0</div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
