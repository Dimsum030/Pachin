<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pachin - Pachinko Game</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
</head>
<body>
    <div id="game-wrapper">
        <div id="ui-layer">
            <div id="ball-count">Balls: 10</div>
            <div id="status-msg">READY</div>
        </div>
        
        <div id="canvas-container">
            <canvas id="pachinko-canvas"></canvas>
            <!-- Charge Bar Overlay -->
            <div id="charge-container">
                <div id="charge-bar"></div>
            </div>
            <div id="game-over-overlay">
                <h1>GAME OVER</h1>
                <button onclick="location.reload()">RESTART</button>
            </div>
        </div>

        <div id="button-layer">
            <button id="shoot-btn">HOLD TO CHARGE</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
